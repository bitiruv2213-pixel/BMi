{% extends 'base.html' %}
{% load static %}

{% block title %}Parol o'zgartirildi - LMS Platform{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-lg">
                <div class="card-body p-5 text-center">
                    <!-- Success Icon -->
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4"
                         style="width: 100px; height: 100px; background: linear-gradient(135deg, #10b981, #059669);">
                        <i class="bi bi-check-circle-fill text-white" style="font-size: 3rem;"></i>
                    </div>

                    <!-- Success Message -->
                    <h2 class="fw-bold mb-3">Parol muvaffaqiyatli o'zgartirildi!</h2>
                    <p class="text-muted mb-4">
                        Sizning parolingiz xavfsiz tarzda yangilandi.
                    </p>

                    <!-- Action Button -->
                    <a href="{% url 'profile' %}" class="btn btn-primary btn-lg px-5">
                        <i class="bi bi-person me-2"></i>Profilga qaytish
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
