{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="{% url 'course_detail' course.slug %}" class="text-decoration-none">
                <i class="bi bi-arrow-left me-2"></i>{{ course.title }}
            </a>
            
            <div class="card mt-3">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-question-circle me-2 text-primary"></i>{{ title }}</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Quiz nomi <span class="text-danger">*</span></label>
                            <input type="text" name="title" class="form-control" value="{{ form.title.value|default:'' }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tavsif</label>
                            <textarea name="description" class="form-control" rows="3">{{ form.description.value|default:'' }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Vaqt limiti (daqiqa)</label>
                                <input type="number" name="time_limit" class="form-control" value="{{ form.time_limit.value|default:30 }}" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">O'tish balli (%)}}</label>
                                <input type="number" name="passing_score" class="form-control" value="{{ form.passing_score.value|default:60 }}" min="0" max="100">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Maks. urinishlar</label>
                                <input type="number" name="max_attempts" class="form-control" value="{{ form.max_attempts.value|default:3 }}" min="1">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-check">
                                    <input type="checkbox" name="shuffle_questions" class="form-check-input" id="shuffle_questions" {% if form.shuffle_questions.value %}checked{% endif %}>
                                    <label class="form-check-label" for="shuffle_questions">Savollarni aralashtirish</label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-check">
                                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if form.is_active.value %}checked{% endif %}>
                                    <label class="form-check-label" for="is_active">Faol</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>Saqlash
                            </button>
                            <a href="{% url 'course_detail' course.slug %}" class="btn btn-outline-secondary">Bekor qilish</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
