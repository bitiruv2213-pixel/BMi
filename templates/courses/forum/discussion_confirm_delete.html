{% extends 'base.html' %}

{% block title %}Mavzuni o'chirish{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0"><i class="bi bi-exclamation-triangle me-2"></i>Mavzuni o'chirish</h5>
            </div>
            <div class="card-body text-center">
                <i class="bi bi-trash text-danger" style="font-size: 4rem;"></i>
                <h4 class="mt-3">{{ discussion.title }}</h4>
                <p class="text-muted">Haqiqatan ham bu mavzuni o'chirmoqchimisiz?</p>
                <p class="text-danger"><strong>Barcha javoblar ham o'chiriladi!</strong></p>
                
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger" onclick="return confirm('Rostdan ham bu mavzuni o\'chirmoqchimisiz?')">
                        <i class="bi bi-trash me-2"></i>Ha, o'chirish
                    </button>
                    <a href="{% url 'discussion_detail' course.slug discussion.pk %}" class="btn btn-secondary">
                        Bekor qilish
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
