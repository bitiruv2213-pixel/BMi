{% extends 'base.html' %}
{% block title %}Javobni o'chirish{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
                    <h4 class="mt-3">Javobni o'chirmoqchimisiz?</h4>
                    
                    <div class="card bg-light text-start my-4">
                        <div class="card-body">
                            <small class="text-muted">{{ reply.author.get_full_name }}</small>
                            <p class="mb-0">{{ reply.content|truncatewords:30 }}</p>
                        </div>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2" onclick="return confirm('Rostdan ham bu javobni o\'chirmoqchimisiz?')">
                            <i class="bi bi-trash me-2"></i>O'chirish
                        </button>
                        <a href="{% url 'discussion_detail' course.slug reply.discussion.pk %}" class="btn btn-secondary">Bekor qilish</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
