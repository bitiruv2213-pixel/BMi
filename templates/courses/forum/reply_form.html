{% extends 'base.html' %}

{% block title %}Javobni tahrirlash{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-pencil me-2"></i>Javobni tahrirlash</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Javob matni</label>
                        {{ form.content }}
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg me-2"></i>Saqlash
                    </button>
                    <a href="{% url 'discussion_detail' course.slug reply.discussion.pk %}" class="btn btn-secondary">
                        Bekor qilish
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
