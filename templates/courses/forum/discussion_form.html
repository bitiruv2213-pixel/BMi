{% extends 'base.html' %}

{% block title %}{{ title }} - Forum{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-chat-plus me-2"></i>{{ title }}</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Mavzu sarlavhasi</label>
                        {{ form.title }}
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Matn</label>
                        {{ form.content }}
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>Saqlash
                        </button>
                        <a href="{% url 'discussion_list' course.slug %}" class="btn btn-secondary">
                            Bekor qilish
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
