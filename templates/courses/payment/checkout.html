{% extends 'base.html' %}

{% block title %}Xarid{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header"><h5>Xarid: {{ course.title }}</h5></div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">To'lov usuli</label>
                            <select name="provider" class="form-select">
                                <option value="payme">Payme</option>
                                <option value="click">Click</option>
                                <option value="uzum">Uzum Bank</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span>Narx:</span>
                            <strong class="text-primary">{{ course.current_price|floatformat:0 }} so'm</strong>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" onclick="return confirm('To\'lovni amalga oshirmoqchimisiz?')">To'lash</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
