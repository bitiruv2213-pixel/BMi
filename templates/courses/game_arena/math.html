{% extends 'base.html' %}
{% block title %}Math Quiz - Game Arena{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <a href="{% url 'game_arena' %}" class="text-muted text-decoration-none">
                <i class="bi bi-arrow-left me-1"></i>Game Arena
            </a>
            <h2 class="mt-2"><i class="bi bi-calculator me-2"></i>Math Quiz</h2>
        </div>
    </div>

    <!-- O'yin sozlamalari -->
    <div id="game-setup" class="card p-4 text-center">
        <h4 class="mb-4">Qiyinlik darajasini tanlang</h4>
        <div class="row g-3 justify-content-center mb-4">
            <div class="col-md-3">
                <button class="btn btn-outline-success w-100 p-3 difficulty-btn" data-difficulty="easy">
                    <i class="bi bi-1-circle fs-3 d-block mb-2"></i>
                    <strong>Oson</strong><br>
                    <small class="text-muted">+, - (1-50)</small>
                </button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-warning w-100 p-3 difficulty-btn" data-difficulty="medium">
                    <i class="bi bi-2-circle fs-3 d-block mb-2"></i>
                    <strong>O'rta</strong><br>
                    <small class="text-muted">+, -, * (1-100)</small>
                </button>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-danger w-100 p-3 difficulty-btn" data-difficulty="hard">
                    <i class="bi bi-3-circle fs-3 d-block mb-2"></i>
                    <strong>Qiyin</strong><br>
                    <small class="text-muted">+, -, *, / (1-200)</small>
                </button>
            </div>
        </div>
    </div>

    <!-- O'yin maydoni -->
    <div id="game-area" style="display: none;">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-3">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-primary" id="question-num">1/20</div>
                    <div class="text-muted small">Savol</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-success" id="correct-count">0</div>
                    <div class="text-muted small">To'g'ri</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-danger" id="wrong-count">0</div>
                    <div class="text-muted small">Noto'g'ri</div>
                </div>
            </div>
            <div class="col-3">
                <div class="card text-center p-3">
                    <div class="fs-3 fw-bold text-warning" id="game-timer">60s</div>
                    <div class="text-muted small">Vaqt</div>
                </div>
            </div>
        </div>

        <!-- Progress bar -->
        <div class="progress mb-4" style="height: 8px;">
            <div class="progress-bar bg-primary" id="progress-bar" style="width: 0%;"></div>
        </div>

        <!-- Savol -->
        <div class="card p-5 text-center mb-4">
            <div id="question-text" style="font-size: 3rem; font-weight: bold; font-family: monospace;"></div>
            <div class="mt-4">
                <input type="number" id="answer-input" class="form-control form-control-lg text-center mx-auto"
                       style="max-width: 200px; font-size: 1.5rem;" placeholder="Javob" autofocus>
            </div>
            <div class="mt-3" id="feedback" style="font-size: 1.5rem; min-height: 2rem;"></div>
        </div>
    </div>

    <!-- Natija -->
    <div id="game-result" style="display: none;">
        <div class="card p-5 text-center">
            <div class="mb-2" id="result-emoji"><i class="bi bi-trophy-fill text-warning" style="font-size: 4rem;"></i></div>
            <h2 class="mb-4">O'yin tugadi!</h2>
            <div class="row g-3 justify-content-center mb-4">
                <div class="col-md-3">
                    <div class="p-3 rounded" style="background: var(--card-bg);">
                        <div class="fs-3 fw-bold text-success" id="final-correct">0</div>
                        <div class="text-muted small">To'g'ri</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 rounded" style="background: var(--card-bg);">
                        <div class="fs-3 fw-bold text-danger" id="final-wrong">0</div>
                        <div class="text-muted small">Noto'g'ri</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 rounded" style="background: var(--card-bg);">
                        <div class="fs-3 fw-bold text-warning" id="final-time">0s</div>
                        <div class="text-muted small">Vaqt</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 rounded" style="background: var(--card-bg);">
                        <div class="fs-3 fw-bold text-info" id="final-xp">+0 XP</div>
                        <div class="text-muted small">XP</div>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2 justify-content-center">
                <button class="btn btn-primary" id="play-again-btn" type="button">
                    <i class="bi bi-arrow-clockwise me-1"></i>Yana o'ynash
                </button>
                <a href="{% url 'game_arena' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-grid me-1"></i>Arena
                </a>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const TOTAL_QUESTIONS = 20;
    const TIME_LIMIT = 60;

    let difficulty = 'easy';
    let currentQuestion = 0;
    let correct = 0;
    let wrong = 0;
    let correctAnswer = 0;
    let timeLeft = TIME_LIMIT;
    let timerInterval = null;
    let startTime = null;
    let questionLocked = false;
    let gameEnded = false;
    const answerInput = document.getElementById('answer-input');

    // Qiyinlik tanlash
    document.querySelectorAll('.difficulty-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            difficulty = this.dataset.difficulty;
            startGame();
        });
    });

    function startGame() {
        currentQuestion = 0;
        correct = 0;
        wrong = 0;
        correctAnswer = 0;
        questionLocked = false;
        gameEnded = false;
        document.getElementById('game-setup').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        document.getElementById('game-result').style.display = 'none';
        document.getElementById('correct-count').textContent = '0';
        document.getElementById('wrong-count').textContent = '0';
        document.getElementById('question-num').textContent = `1/${TOTAL_QUESTIONS}`;
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('game-timer').textContent = TIME_LIMIT + 's';
        document.getElementById('game-timer').style.color = '';
        startTime = Date.now();
        timeLeft = TIME_LIMIT;
        answerInput.disabled = false;

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('game-timer').textContent = timeLeft + 's';
            if (timeLeft <= 10) document.getElementById('game-timer').style.color = '#ef4444';
            if (timeLeft <= 0) endGame();
        }, 1000);

        generateQuestion();
        answerInput.focus();
    }

    function generateQuestion() {
        if (currentQuestion >= TOTAL_QUESTIONS) {
            endGame();
            return;
        }
        currentQuestion++;

        let a, b, op, answer;
        const ops_easy = ['+', '-'];
        const ops_medium = ['+', '-', '*'];
        const ops_hard = ['+', '-', '*', '/'];

        let ops, maxNum;
        if (difficulty === 'easy') { ops = ops_easy; maxNum = 50; }
        else if (difficulty === 'medium') { ops = ops_medium; maxNum = 100; }
        else { ops = ops_hard; maxNum = 200; }

        op = ops[Math.floor(Math.random() * ops.length)];
        a = Math.floor(Math.random() * maxNum) + 1;
        b = Math.floor(Math.random() * maxNum) + 1;

        if (op === '-' && a < b) [a, b] = [b, a];
        if (op === '/') {
            b = Math.floor(Math.random() * 20) + 1;
            a = b * (Math.floor(Math.random() * 15) + 1);
        }
        if (op === '*') {
            a = Math.floor(Math.random() * 20) + 1;
            b = Math.floor(Math.random() * 20) + 1;
        }

        switch(op) {
            case '+': answer = a + b; break;
            case '-': answer = a - b; break;
            case '*': answer = a * b; break;
            case '/': answer = a / b; break;
        }
        correctAnswer = answer;
        questionLocked = false;

        document.getElementById('question-text').textContent = `${a} ${op} ${b} = ?`;
        document.getElementById('question-num').textContent = `${currentQuestion}/${TOTAL_QUESTIONS}`;
        document.getElementById('progress-bar').style.width = `${(currentQuestion / TOTAL_QUESTIONS) * 100}%`;
        answerInput.value = '';
        document.getElementById('feedback').textContent = '';
        answerInput.focus();
    }

    answerInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (questionLocked || gameEnded) return;
            const userAnswer = parseFloat(this.value);
            if (isNaN(userAnswer)) return;
            questionLocked = true;

            if (Math.abs(userAnswer - correctAnswer) < 0.01) {
                correct++;
                document.getElementById('correct-count').textContent = correct;
                document.getElementById('feedback').innerHTML = '<span class="text-success">To\'g\'ri!</span>';
            } else {
                wrong++;
                document.getElementById('wrong-count').textContent = wrong;
                document.getElementById('feedback').innerHTML = `<span class="text-danger">Javob: ${correctAnswer}</span>`;
            }

            setTimeout(generateQuestion, 600);
        }
    });

    function endGame() {
        if (gameEnded) return;
        gameEnded = true;
        clearInterval(timerInterval);
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-result').style.display = 'block';
        answerInput.disabled = true;

        const timeSpent = Math.round((Date.now() - startTime) / 1000);
        const totalAnswered = correct + wrong;

        document.getElementById('final-correct').textContent = correct;
        document.getElementById('final-wrong').textContent = wrong;
        document.getElementById('final-time').textContent = timeSpent + 's';

        if (correct >= 15) document.getElementById('result-emoji').innerHTML = '<i class="bi bi-trophy-fill text-warning" style="font-size: 4rem;"></i>';
        else if (correct >= 10) document.getElementById('result-emoji').innerHTML = '<i class="bi bi-emoji-smile-fill text-success" style="font-size: 4rem;"></i>';
        else if (correct >= 5) document.getElementById('result-emoji').innerHTML = '<i class="bi bi-hand-thumbs-up-fill text-primary" style="font-size: 4rem;"></i>';
        else document.getElementById('result-emoji').innerHTML = '<i class="bi bi-lightning-charge-fill text-info" style="font-size: 4rem;"></i>';

        fetch("{% url 'math_game_submit' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                correct: correct,
                total: totalAnswered,
                time_spent: timeSpent,
                difficulty: difficulty
            })
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('final-xp').textContent = '+' + data.xp_earned + ' XP';
        })
        .catch(() => {
            document.getElementById('final-xp').textContent = '+0 XP';
        });
    }

    document.getElementById('play-again-btn').addEventListener('click', function() {
        clearInterval(timerInterval);
        document.getElementById('game-setup').style.display = 'block';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('game-result').style.display = 'none';
    });
})();
</script>
{% endblock %}
