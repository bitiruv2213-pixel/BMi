{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="{% url 'quiz_detail' quiz.pk %}" class="text-decoration-none">
                <i class="bi bi-arrow-left me-2"></i>{{ quiz.title }}
            </a>
            
            <div class="card mt-3">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-question-lg me-2 text-primary"></i>{{ title }}</h5>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Savol matni <span class="text-danger">*</span></label>
                            <textarea name="text" class="form-control" rows="3" required>{{ form.text.value|default:'' }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Savol turi</label>
                                <select name="question_type" class="form-select">
                                    <option value="single">Bitta javob</option>
                                    <option value="multiple">Ko'p javob</option>
                                    <option value="text">Matnli javob</option>
                                </select>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Ball</label>
                                <input type="number" name="points" class="form-control" value="{{ form.points.value|default:10 }}" min="1">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label fw-bold">Tartib</label>
                                <input type="number" name="order" class="form-control" value="{{ form.order.value|default:1 }}" min="1">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Rasm (ixtiyoriy)</label>
                            <input type="file" name="image" class="form-control" accept="image/*">
                        </div>
                        
                        <hr>
                        <h6>Javoblar</h6>
                        <div id="answers">
                            {% for i in "1234" %}
                            <div class="row mb-2 answer-row">
                                <div class="col-md-8">
                                    <input type="text" name="answer_{{ forloop.counter }}" class="form-control" placeholder="Javob {{ forloop.counter }}">
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check mt-2">
                                        <input type="checkbox" name="correct_{{ forloop.counter }}" class="form-check-input" id="correct_{{ forloop.counter }}">
                                        <label class="form-check-label" for="correct_{{ forloop.counter }}">To'g'ri</label>
                                    </div>
                                </div>
                            </div>
                            {% endfor %}
                        </div>
                        
                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>Saqlash
                            </button>
                            <a href="{% url 'quiz_detail' quiz.pk %}" class="btn btn-outline-secondary">Bekor qilish</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
