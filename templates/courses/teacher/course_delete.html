{% extends 'base.html' %}
{% block title %}Kursni o'chirish{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-0 shadow-sm">
                <div class="card-body text-center py-5">
                    <i class="bi bi-exclamation-triangle text-danger display-1"></i>
                    <h4 class="mt-3">Kursni o'chirmoqchimisiz?</h4>
                    <p class="text-muted">"{{ course.title }}" kursi o'chiriladi.</p>
                    
                    <form method="post" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger" onclick="return confirm('Rostdan ham bu kursni o\'chirmoqchimisiz?')"><i class="bi bi-trash me-2"></i>O'chirish</button>
                        <a href="{% url 'teacher_courses' %}" class="btn btn-outline-secondary">Bekor</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
