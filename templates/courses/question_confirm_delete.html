{% extends 'base.html' %}
{% block title %}Savolni o'chirish{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 4rem;"></i>
                    <h4 class="mt-3">Savolni o'chirmoqchimisiz?</h4>
                    <p class="text-muted">{{ question.text|truncatewords:20 }}</p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger me-2" onclick="return confirm('Rostdan ham bu savolni o\'chirmoqchimisiz?')">
                            <i class="bi bi-trash me-2"></i>O'chirish
                        </button>
                        <a href="{% url 'quiz_detail' question.quiz.pk %}" class="btn btn-secondary">Bekor qilish</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
